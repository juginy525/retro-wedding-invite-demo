<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 50px;
            background-color: #FFFFFF;
        }
        .hero-catchphrase {
            font-family: 'Caveat', cursive;
            font-size: 150px;
            color: #1A1A1A;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            white-space: nowrap;
        }
        .drawn-heart {
            width: 120px;
            height: 120px;
            transform: translateY(10px) rotate(5deg);
        }
    </style>
</head>
<body>
    <div class="hero-catchphrase" id="target">
        Nothing Fancy, Just Love
        <svg class="drawn-heart" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <filter id="pencil">
                <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <path d="M 20 90 C 25 75, 10 30, 25 15 C 40 5, 50 30, 50 45 C 50 30, 65 5, 80 15 C 95 30, 60 75, 40 85 C 30 90, 25 90, 15 95" fill="none" stroke="#e01a1a" stroke-width="6" stroke-linecap="round" filter="url(#pencil)" />
        </svg>
    </div>
</body>
</html>
